server {
    listen 3000;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        # Optional: proxy to backend if you want same-origin in production
        # proxy_pass http://backend:8000;
        return 404;
    }
}
