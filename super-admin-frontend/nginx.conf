server {
    listen 3001;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any path under /super-admin/ that isn't a static asset
    # falls back to index.html so React Router handles it client-side.
    location /super-admin/ {
        try_files $uri $uri/ /super-admin/index.html;
    }

    # Redirect bare root to the login page
    location = / {
        return 301 /super-admin/login;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}
